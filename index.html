function DreamSlider() {

  const [msgs, setMsgs] = useState([{ role: "assistant", content: "Szia! 💜 Én vagyok a DigitaLady Mentor. Kérdezz bátran — az indulásról, az átverésekről, az AI eszközökről. Egyszerűen és őszintén válaszolok." }]);

  const [loading, setLoading] = useState(false);
  const [msgCount, setMsgCount] = useState(0);
  const [premium, setPremium] = useState(false);
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    const newCount = msgCount + 1;
    setMsgCount(newCount);
    const updated = [...msgs, { role: "user", content: text }];
    setMsgs(updated);
    setInput("");
    if (newCount > FREE_LIMIT) { setPremium(true); return; }
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM_PROMPT, messages: updated.map(m => ({ role: m.role, content: m.content })) }) });

      const reply = data.content?.find(b => b.type === "text")?.text || "Probald ujra! 💜";
      setMsgs(p => [...p, { role: "assistant", content: reply }]);
    } catch (_) { setMsgs(p => [...p, { role: "assistant", content: "Technikai hiba, probald ujra! 💜" }]); }
    setLoading(false);
  };

  const remaining = Math.max(0, FREE_LIMIT - msgCount);

        <div>
          <div style={{ fontWeight: 800, fontSize: 16, color: T.ink }}>DigitaLady Mentor</div>
          <div style={{ fontSize: 12, color: T.sageDark, fontWeight: 700, display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: T.sageDark, display: "inline-block" }} /> Online — kérdezz bátran
          </div>
        </div>
        {!premium && <div style={{ marginLeft: "auto", background: T.white, borderRadius: 20, padding: "5px 14px", fontSize: 12, fontWeight: 700, color: remaining > 1 ? T.lavDark : T.mauve, border: `1px solid ${remaining > 1 ? "#DDD6FE" : T.blush}` }}>{remaining} ingyenes kérdés</div>}
      </div>
      <div style={{ background: T.white, borderRadius: 16, padding: "14px", maxHeight: 280, overflowY: "auto", marginBottom: 12, border: `1.5px solid #EDE8F5` }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
            {m.role === "assistant" && <div style={{ width: 28, height: 28, borderRadius: "50%", background: `linear-gradient(135deg,${T.mauve},${T.lavDark})`, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, marginRight: 8, marginTop: 2 }}>💜</div>}
            <div style={{ maxWidth: "80%", background: m.role === "user" ? `linear-gradient(135deg,${T.mauve},${T.lavDark})` : T.lav, color: m.role === "user" ? "#fff" : T.ink, borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px", padding: "11px 15px", fontSize: 14.5, lineHeight: 1.6, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", whiteSpace: "pre-wrap" }}>{m.content}</div>

        {loading && (
